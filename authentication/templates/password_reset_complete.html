<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Password Reset Complete</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body {
            background-color: #f5f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .card {
            border: 0;
            box-shadow: 0 2px 6px 0 rgba(67, 89, 113, 0.12);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body p-4">
                        <h4 class="mb-2">Password Reset Complete ✅</h4>
                        <p class="mb-4">Your password has been set. You may go ahead and log in now.</p>
                        <div class="text-center mt-3">
                            <a href="{% url 'login' %}" class="btn btn-primary w-100">Log in</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
