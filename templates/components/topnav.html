{# Top Navigation Component - Bootstrap 5 with Dark Mode Toggle #}
<nav class="navbar navbar-expand-lg navbar-light navbar-glass py-2">
  <div class="container-fluid">
    <a class="navbar-brand fw-semibold" href="#" style="letter-spacing: 0.2px">
      {{ LOGO_TEXT }}<span
        class="ms-1 d-inline-block"
        style="
          width: 0.5rem;
          height: 0.5rem;
          background: #0a84ff;
          border-radius: 50%;
        "
      ></span>
    </a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#topnav-collapse"
      aria-controls="topnav-collapse"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="topnav-collapse">
      <div class="ms-auto d-flex align-items-center gap-3">
        <div class="form-check form-switch m-0" title="Toggle dark mode">
          <input
            class="form-check-input"
            type="checkbox"
            role="switch"
            id="themeToggle"
          />
          <label class="form-check-label d-none d-sm-inline" for="themeToggle"
            >Dark</label
          >
        </div>

        <a
          href="#"
          class="d-inline-flex align-items-center justify-content-center rounded-circle border"
          style="
            width: 38px;
            height: 38px;
            background: var(--bs-secondary-bg);
            color: var(--bs-emphasis-color);
          "
        >
          {% if request.user.is_authenticated %}
          <span class="fw-semibold small"
            >{{ request.user.username|default_if_none:""|slice:":1"|upper
            }}</span
          >
          {% else %}
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            fill="currentColor"
            viewBox="0 0 16 16"
            aria-hidden="true"
          >
            <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0" />
            <path
              fill-rule="evenodd"
              d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8m8-7a7 7 0 0 0-5.468 11.37c.69-1.2 2.342-2.37 4.968-2.37 2.626 0 4.278 1.17 4.968 2.37A7 7 0 0 0 8 1"
            />
          </svg>
          {% endif %}
        </a>
      </div>
    </div>
  </div>
</nav>
