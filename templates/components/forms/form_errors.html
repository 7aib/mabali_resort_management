{% if messages %}
<div class="toast-container position-fixed top-0 end-0 p-4 form-errors-container" style="z-index: 9999;">
  {% for message in messages %}
    <div class="toast align-items-center border-0 mb-2 shadow-lg 
        {% if message.tags == 'error' %}bg-danger text-white
        {% elif message.tags == 'success' %}bg-success text-white
        {% elif message.tags == 'warning' %}bg-warning text-dark
        {% else %}bg-primary text-white{% endif %}" 
        role="alert" aria-live="assertive" aria-atomic="true">
      
      <div class="d-flex">
        <div class="toast-body fw-medium">
          {% if message.tags == 'error' %}<i class="bx bx-error-alt me-2"></i>
          {% elif message.tags == 'success' %}<i class="bx bx-check-circle me-2"></i>
          {% else %}<i class="bx bx-info-circle me-2"></i>{% endif %}
          {{ message }}
        </div>
        <button type="button" class="btn-close {% if message.tags != 'warning' %}btn-close-white{% endif %} me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
    </div>
  {% endfor %}
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    var toastElList = [].slice.call(document.querySelectorAll('.toast'));
    var toastList = toastElList.map(function(toastEl) {
      return new bootstrap.Toast(toastEl, {
        autohide: true,
        delay: 5000
      });
    });
    toastList.forEach(toast => toast.show());
  });
</script>
{% endif %}
