<div class="mb-3">
  <label for="{{ id }}" class="form-label">{{ label }}</label>
  <div class="form-check form-switch mt-3">
    <input class="form-check-input" type="checkbox" id="{{ id }}" name="{{ name|default:id }}" {% if checked %}checked{% endif %}>
    <label class="form-check-label" for="{{ id }}">
      {{ label_text|default:'Status' }} 
      {% if checked %}
        <span class="badge bg-label-success ms-2">{{ active_badge|default:'Currently Active' }}</span>
      {% else %}
        <span class="badge bg-label-danger ms-2">{{ inactive_badge|default:'Currently Inactive' }}</span>
      {% endif %}
    </label>
  </div>
</div>
